spring:
  datasource:
    url: jdbc:h2:mem:generate;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  secret: generate-secret-key-must-be-at-least-32-bytes-long-for-hs256
  expiration-ms: 86400000
