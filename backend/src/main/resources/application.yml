server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: manifesto

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/manifesto}
    username: ${DB_USERNAME:manifesto}
    password: ${DB_PASSWORD:manifesto}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-chat}

jwt:
  secret: ${JWT_SECRET:manifesto-jwt-secret-key-must-be-at-least-32-bytes-long-for-hs256}
  expiration-ms: 86400000

app:
  admin:
    enabled: ${ADMIN_AUTO_CREATE:true}
    username: ${ADMIN_USERNAME:admin}
    email: ${ADMIN_EMAIL:admin@manifesto.local}
    password: ${ADMIN_PASSWORD:admin}
  tagging:
    enabled: ${TAGGING_ENABLED:true}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
