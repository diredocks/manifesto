server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: manifesto

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/manifesto}
    username: ${DB_USERNAME:manifesto}
    password: ${DB_PASSWORD:manifesto}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

jwt:
  secret: ${JWT_SECRET:manifesto-jwt-secret-key-must-be-at-least-32-bytes-long-for-hs256}
  expiration-ms: 86400000

app:

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
