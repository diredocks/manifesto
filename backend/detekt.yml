config:
  validation: true
  warningsAsErrors: false

processors:
  active: true
  exclude:
    - 'DetektProgressListener'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedFindingsReport'

exceptions:
  active: true
  TooGenericExceptionCaught:
    active: false

complexity:
  active: true
  LongParameterList:
    active: true
    allowedFunctionParameters: 8
    allowedConstructorParameters: 10
    ignoreDefaultParameters: true
  TooManyFunctions:
    active: true
    allowedFunctionsPerFile: 15
    allowedFunctionsPerClass: 15
    ignorePrivate: true
  NestedBlockDepth:
    active: true
    allowedDepth: 5

style:
  active: true
  MaxLineLength:
    active: true
    maxLineLength: 140
    excludePackageStatements: true
    excludeImportStatements: true
    excludeCommentStatements: true
  WildcardImport:
    active: true
    excludeImports: []
  FunctionOnlyReturningConstant:
    active: false
  ForbiddenComment:
    active: true
    comments: ['TODO', 'FIXME']
    allowedPatterns: ''
  MagicNumber:
    active: true
    ignoreNumbers: ['-1', '0', '1', '2', '10', '100', '1000']
    ignoreHashCodeFunction: true
    ignorePropertyDeclaration: true
    ignoreCompanionObjectPropertyDeclaration: true
  ReturnCount:
    active: true
    max: 4
    excludeGuardClauses: true
  UnusedPrivateProperty:
    active: true
    allowedNames: '(_|ignored|expected)'

naming:
  active: true
  FunctionNaming:
    active: true
    ignoreAnnotated: ['Composable']
  TopLevelPropertyNaming:
    active: true
    constantPattern: '[A-Z][_A-Z0-9]*'

comments:
  active: true
  AbsentOrWrongFileLicense:
    active: false

performance:
  active: true
  SpreadOperator:
    active: false

coroutines:
  active: true
  RedundantSuspendModifier:
    active: true
