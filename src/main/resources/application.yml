server:
  port: 8080

spring:
  application:
    name: manifesto

  datasource:
    url: jdbc:postgresql://localhost:5432/manifesto
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        concurrency: 2
        max-concurrency: 5
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2

  ai:
    openai:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_OPENAI_API_ENDPOINT:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-chat

jwt:
  secret: manifesto-jwt-secret-key-must-be-at-least-32-bytes-long-for-hs256
  expiration-ms: 86400000

app:
  feed:
    top100-ttl-minutes: 5

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
