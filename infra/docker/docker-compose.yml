services:
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    container_name: manifesto-app
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - ../../.env
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/manifesto
      - DB_USERNAME=manifesto
      - DB_PASSWORD=manifesto
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=guest
      - RABBITMQ_PASSWORD=guest
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: manifesto-postgres
    environment:
      POSTGRES_DB: manifesto
      POSTGRES_USER: manifesto
      POSTGRES_PASSWORD: manifesto
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U manifesto"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: manifesto-rabbitmq
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
